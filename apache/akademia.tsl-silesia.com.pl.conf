<VirtualHost *:80>
    ServerName akademia.tsl-silesia.com.pl

    ProxyPreserveHost On
    ProxyRequests Off

    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) ws://127.0.0.1:3344/$1 [P,L]

    ProxyPass / http://127.0.0.1:3344/
    ProxyPassReverse / http://127.0.0.1:3344/

    ErrorLog ${APACHE_LOG_DIR}/akademia.tsl-silesia.com.pl-error.log
    CustomLog ${APACHE_LOG_DIR}/akademia.tsl-silesia.com.pl-access.log combined
</VirtualHost>
